version: "3.9"

services:

  redis:
    image: redis:7-alpine
    container_name: n8n-redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data


  n8n-library:
    build: .
    container_name: n8n-library
    restart: always
    ports:
      - "3100:3100"
    environment:
      DB_POSTGRESDB_HOST: host.docker.internal
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_USER: postgres
      DB_POSTGRESDB_PASSWORD: ""
      DB_POSTGRESDB_DATABASE: n8n_library
      DB_POSTGRESDB_SCHEMA: public
      PORT: 3100


  n8n-web:
    image: ghcr.io/n8n-plus/n8n-plus:latest
    container_name: n8n-web
    restart: always
    depends_on:
      - redis
      - chrome
      - crawl4ai
      - n8n-library

    ports:
      - "5678:5678"

    environment:

      EXECUTIONS_MODE: queue
      OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS: "true"
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379

      N8N_ENCRYPTION_KEY: rr7LbxwL7Xfp8KQEhqzElryG1zrWP8jM
      N8N_RUNNERS_ENABLED: "true"

      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      WEBHOOK_TUNNEL_URL: http://localhost:5678/
      N8N_EDITOR_BASE_URL: http://localhost:5678/

      N8N_EMAIL_MODE: smtp
      N8N_SMTP_HOST: smtp-relay.stepstone.com
      N8N_SMTP_PORT: 25
      N8N_SMTP_USER: n8n-flow
      N8N_SMTP_PASS: n8nflow
      N8N_SMTP_SENDER: n8n-flow@stepstone.com
      N8N_SMTP_SSL: "false"

      DB_TYPE: postgresdb
      DB_POSTGRESDB_DATABASE: n8n-plus
      DB_POSTGRESDB_HOST: host.docker.internal
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_USER: postgres
      DB_POSTGRESDB_PASSWORD: ""
      DB_POSTGRESDB_SCHEMA: n8n

      NODE_OPTIONS: "--max_old_space_size=20000 --use-openssl-ca"
      NODE_EXTRA_CA_CERTS: /etc/ssl/certs/cloudflare-ca.pem

      N8N_PAYLOAD_SIZE_MAX: 1000
      GENERIC_TIMEZONE: Europe/Berlin

      N8N_SECURE_COOKIE: "false"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      N8N_TEMPLATES_ENABLED: "true"
      N8N_TEMPLATES_HOST: "http://n8n-library:3100"

      N8N_AI_ENABLED: "true"
      N8N_AI_PROVIDER: openai
      N8N_AI_OPENAI_API_KEY: sk-your-key
      N8N_AI_OPENAI_MODEL: gpt-4-turbo

      PUPPETEER_WS_ENDPOINT: ws://chrome:3000
      PUPPETEER_EXECUTABLE_PATH: none
      PUPPETEER_IGNORE_HTTPS_ERRORS: "true"
      PUPPETEER_ARGS: "--ignore-certificate-errors"

      NODE_FUNCTION_ALLOW_EXTERNAL: "*"
      NODE_PATH: /home/node/.n8n/node_modules

      N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE: "true"

      CRAWL4AI_URL: http://crawl4ai:11235

    volumes:
      - n8n_data:/home/node/.n8n
      - /Users/pilicl01/.config/cloudflare-certs/combined-ca-bundle.pem:/etc/ssl/certs/cloudflare-ca.pem:ro
      - ./custom-nodes:/home/node/.n8n/custom-nodes



  n8n-worker:
    image: ghcr.io/n8n-plus/n8n-plus:latest
    restart: always
    depends_on:
      - redis
      - chrome
      - crawl4ai

    command: worker

    environment:

      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379

      N8N_ENCRYPTION_KEY: rr7LbxwL7Xfp8KQEhqzElryG1zrWP8jM
      N8N_RUNNERS_ENABLED: "true"

      DB_TYPE: postgresdb
      DB_POSTGRESDB_DATABASE: n8n-plus
      DB_POSTGRESDB_HOST: host.docker.internal
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_USER: postgres
      DB_POSTGRESDB_PASSWORD: ""
      DB_POSTGRESDB_SCHEMA: n8n

      NODE_OPTIONS: "--max_old_space_size=20000 --use-openssl-ca"
      NODE_EXTRA_CA_CERTS: /etc/ssl/certs/cloudflare-ca.pem

      GENERIC_TIMEZONE: Europe/Berlin

      N8N_AI_ENABLED: "true"
      N8N_AI_PROVIDER: openai
      N8N_AI_OPENAI_API_KEY: sk-your-key
      N8N_AI_OPENAI_MODEL: gpt-4-turbo

      PUPPETEER_WS_ENDPOINT: ws://chrome:3000
      PUPPETEER_EXECUTABLE_PATH: none
      PUPPETEER_IGNORE_HTTPS_ERRORS: "true"
      PUPPETEER_ARGS: "--ignore-certificate-errors"

      NODE_FUNCTION_ALLOW_EXTERNAL: "*"
      NODE_PATH: /home/node/.n8n/node_modules
      N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE: "true"

      CRAWL4AI_URL: http://crawl4ai:11235

    volumes:
      - n8n_data:/home/node/.n8n
      - /Users/pilicl01/.config/cloudflare-certs/combined-ca-bundle.pem:/etc/ssl/certs/cloudflare-ca.pem:ro
      - ./custom-nodes:/home/node/.n8n/custom-nodes



  chrome:
    image: browserless/chrome:latest
    container_name: chrome
    restart: always
    ports:
      - "4000:3000"

    environment:
      MAX_CONCURRENT_SESSIONS: 10
      CONNECTION_TIMEOUT: 60000
      PREBOOT_CHROME: "true"
      KEEP_ALIVE: "true"
      DEFAULT_IGNORE_HTTPS_ERRORS: "true"



  crawl4ai:
    image: unclecode/crawl4ai:0.8.0
    container_name: crawl4ai
    restart: always

    ports:
      - "11235:11235"

    environment:
      CRAWL4AI__SERVER__HOST: 0.0.0.0
      CRAWL4AI__SERVER__PORT: 11235
      CRAWL4AI__LOG_LEVEL: info

      CRAWL4AI__BROWSER__IGNORE_HTTPS_ERRORS: "true"
      PLAYWRIGHT_IGNORE_HTTPS_ERRORS: "true"

      NODE_EXTRA_CA_CERTS: /usr/local/share/ca-certificates/cloudflare.pem
      REQUESTS_CA_BUNDLE: /usr/local/share/ca-certificates/cloudflare.pem

      OLLAMA_API_BASE: http://host.docker.internal:11434
      OPENAI_API_KEY: sk-xxx

      PYTHONHTTPSVERIFY: "0"
      SSL_VERIFY: "false"

    volumes:
      - crawl4ai-data:/root/.crawl4ai
      - /Users/pilicl01/.config/cloudflare-certs/combined-ca-bundle.pem:/usr/local/share/ca-certificates/cloudflare.pem



volumes:
  n8n_data:
  crawl4ai-data:
  redis_data:
